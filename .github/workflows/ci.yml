name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: cargo test
        run: cargo test --all-targets

      - name: cargo build --release
        run: cargo build --release

  integration-mysql:
    name: MySQL Integration (optional)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: MySQL integration tests
        env:
          MYSQL_DATABASE_URL: ${{ secrets.MYSQL_DATABASE_URL }}
        run: |
          if [ -z "$MYSQL_DATABASE_URL" ]; then
            echo "Skipping MySQL integration tests — set MYSQL_DATABASE_URL repo secret to enable."
          else
            cargo test --test mysql_integration -- --ignored
          fi
