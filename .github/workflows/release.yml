name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: mcp-sql-rust-x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: mcp-sql-rust-aarch64-unknown-linux-gnu
            cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: mcp-sql-rust-x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: mcp-sql-rust-aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: mcp-sql-rust-x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install cross
        if: matrix.cross == true
        run: cargo install cross --locked

      - name: Build release binary
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package binary (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          mkdir -p dist mcpb-pack
          BIN="target/${{ matrix.target }}/release/mcp-sql-rust"
          cp "$BIN" mcpb-pack/mcp-sql-rust
          cp mcpb/manifest.json mcpb-pack/manifest.json
          cp "$BIN" "dist/mcp-sql-rust"
          tar -czf "dist/${{ matrix.artifact }}.tar.gz" -C dist mcp-sql-rust
          rm "dist/mcp-sql-rust"

      - name: Package binary (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $bin = "target/${{ matrix.target }}/release/mcp-sql-rust.exe"
          Copy-Item $bin "dist/mcp-sql-rust.exe"
          Compress-Archive -Path "dist/mcp-sql-rust.exe" -DestinationPath "dist/${{ matrix.artifact }}.zip" -Force
          Remove-Item "dist/mcp-sql-rust.exe"

      - uses: actions/setup-node@v4
        if: matrix.os != 'windows-latest'
        with:
          node-version: "20"

      - name: Package MCPB bundle
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          npm install -g @anthropic-ai/mcpb
          mcpb pack mcpb-pack "dist/${{ matrix.artifact }}.mcpb"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate SHA256SUMS
        run: |
          cd dist
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/**
