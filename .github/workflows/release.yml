name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  # Soft size budget for stripped Linux x64 (plan target ≤12MB; fail loudly if huge)
  MAX_LINUX_X64_BYTES: "16000000"

jobs:
  build:
    name: Build ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: strut-stack-sql-linux-x64
            check_size: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset: strut-stack-sql-linux-arm64
            cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            asset: strut-stack-sql-macos-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: strut-stack-sql-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: strut-stack-sql-windows-x64

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install cross
        if: matrix.cross == true
        run: cargo install cross --locked

      - name: Build release binary
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} --bins
          else
            cargo build --release --target ${{ matrix.target }} --bins
          fi

      - name: Package binary (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          mkdir -p dist mcpb-pack
          BIN="target/${{ matrix.target }}/release/strut-stack-sql"
          test -x "$BIN"
          if [ "${{ matrix.check_size }}" = "true" ]; then
            SIZE=$(wc -c < "$BIN")
            echo "binary_size_bytes=$SIZE"
            if [ "$SIZE" -gt "$MAX_LINUX_X64_BYTES" ]; then
              echo "ERROR: binary $SIZE bytes exceeds budget $MAX_LINUX_X64_BYTES" >&2
              exit 1
            fi
          fi
          cp "$BIN" mcpb-pack/strut-stack-sql
          cp mcpb/manifest.json mcpb-pack/manifest.json
          cp "$BIN" "dist/strut-stack-sql"
          tar -czf "dist/${{ matrix.asset }}.tar.gz" -C dist strut-stack-sql
          rm "dist/strut-stack-sql"

      - name: Package binary (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $bin = "target/${{ matrix.target }}/release/strut-stack-sql.exe"
          Copy-Item $bin "dist/strut-stack-sql.exe"
          Compress-Archive -Path "dist/strut-stack-sql.exe" -DestinationPath "dist/${{ matrix.asset }}.zip" -Force
          Remove-Item "dist/strut-stack-sql.exe"

      - uses: actions/setup-node@v4
        if: matrix.os != 'windows-latest'
        with:
          node-version: "20"

      - name: Package MCPB bundle
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          npm install -g @anthropic-ai/mcpb
          mcpb pack mcpb-pack "dist/${{ matrix.asset }}.mcpb" || true

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate SHA256SUMS
        run: |
          cd dist
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/**
