schema_version = 1

[filters.mcp_sql_rg]
description = "mcp-sql-rust: ripgrep — keep match lines"
match_command = "^rg\\b"
strip_ansi = true
confidence = 0.88
strip_lines_matching = ["^\\s*$"]
keep_lines_matching = [
  ":\\d+:",
  "error",
  "Error",
  "FAILED",
  "src/",
  "tests/",
]
max_lines = 50
on_empty = "rg: no matches"

[filters.mcp_sql_cargo]
description = "mcp-sql-rust: cargo build/test — keep errors + summary"
match_command = "^cargo\\s+(build|test|check|clippy)"
strip_ansi = true
confidence = 0.9
keep_lines_matching = [
  "^error",
  "^warning:.*mcp-sql",
  "FAILED",
  "test result:",
  "Compiling mcp-sql",
  "Finished",
  "running \\d+ test",
  "ok\\.",
  "FAILED",
  "--> src/",
  "--> tests/",
]
max_lines = 80
on_empty = "cargo: completed (no output kept)"

[filters.mcp_sql_git_diff]
description = "mcp-sql-rust: git diff — cap and keep file headers + hunks"
match_command = "^git\\s+diff"
strip_ansi = true
confidence = 0.85
keep_lines_matching = [
  "^diff --git",
  "^index ",
  "^--- ",
  "^\\+\\+\\+ ",
  "^@@",
  "^[+-]",
]
max_lines = 120

[filters.mcp_sql_read]
description = "mcp-sql-rust: head/tail/sed/cat — cap lines"
match_command = "^(sed|cat|head|tail)\\b"
strip_ansi = true
confidence = 0.8
max_lines = 80
on_empty = "read: completed (no output)"
